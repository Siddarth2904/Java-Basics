<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
<div class="container">
    <div class="calculator">
        <h1>Calculator</h1>

        <form th:action="@{/calculate}" method="post" class="calculator-form">
            <div class="input-group">
                <label for="num1">First Number:</label>
                <input type="number"
                       id="num1"
                       name="num1"
                       step="any"
                       th:value="${calculation.num1}"
                       required>
            </div>

            <div class="input-group">
                <label for="operation">Operation:</label>
                <select id="operation" name="operation" required>
                    <option value="add" th:selected="${calculation.operation == 'add'}">+ (Add)</option>
                    <option value="subtract" th:selected="${calculation.operation == 'subtract'}">- (Subtract)</option>
                    <option value="multiply" th:selected="${calculation.operation == 'multiply'}">× (Multiply)</option>
                    <option value="divide" th:selected="${calculation.operation == 'divide'}">÷ (Divide)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="num2">Second Number:</label>
                <input type="number"
                       id="num2"
                       name="num2"
                       step="any"
                       th:value="${calculation.num2}"
                       required>
            </div>

            <button type="submit" class="calculate-btn">Calculate</button>
        </form>

        <div th:if="${calculation.result != 0 || calculation.num1 != 0 || calculation.num2 != 0}"
             class="result-container">
            <h2>Result</h2>
            <div th:if="${calculation.hasError()}" class="error">
                <p th:text="${calculation.error}"></p>
            </div>
            <div th:unless="${calculation.hasError()}" class="result">
                <p>
                    <span th:text="${calculation.num1}"></span>
                    <span th:text="${calculation.getOperationSymbol()}"></span>
                    <span th:text="${calculation.num2}"></span>
                    <span>=</span>
                    <strong th:text="${calculation.result}"></strong>
                </p>
            </div>
        </div>

        <div class="quick-buttons">
            <h3>Quick Examples</h3>
            <button onclick="fillExample(10, 5, 'add')">10 + 5</button>
            <button onclick="fillExample(20, 7, 'subtract')">20 - 7</button>
            <button onclick="fillExample(8, 3, 'multiply')">8 × 3</button>
            <button onclick="fillExample(15, 3, 'divide')">15 ÷ 3</button>
            <button onclick="fillExample(7, 0, 'divide')">7 ÷ 0 (Error)</button>
        </div>
    </div>
</div>

<script>
    function fillExample(num1, num2, operation) {
        document.getElementById('num1').value = num1;
        document.getElementById('num2').value = num2;
        document.getElementById('operation').value = operation;
        document.querySelector('form').submit();
    }
</script>
</body>
</html>
